services:
  laboratoire_cyber:
    build: .
    container_name: mon_labo_cyber
    ports:
      - "127.0.0.1:8443:443"
      - "127.0.0.1:2222:22"
    restart: unless-stopped
    networks:
      - shuffle
      - executions

  zap-server:
    image: ghcr.io/zaproxy/zaproxy:stable
    container_name: zap-server
    command: >
      zap.sh -daemon -host 0.0.0.0 -port 8080
      -config api.key=12345
      -config "api.addrs.addr.name=.*"
      -config api.addrs.addr.regex=true
    restart: unless-stopped
    networks:
      - executions

networks:
  shuffle:
    external: true
    name: shuffle_shuffle
  executions:
    external: true
    name: shuffle_swarm_executions
